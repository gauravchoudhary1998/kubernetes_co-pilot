apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
      - name: app
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "Starting application..."
          sleep 2
          echo "Fatal error: database unavailable"
          exit 1